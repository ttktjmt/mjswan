name: deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'examples/demo/main.py'
      - 'src/mjswan/**'
      - 'pyproject.toml'
      - '.github/workflows/deploy.yml'

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Free disk space
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: false
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: false

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        python-version: '3.12'

    - name: Install Python dependencies
      run: uv sync --extra examples

    - name: Build demo application
      run: |
        (while true; do echo "$(date '+%H:%M:%S') disk: $(df -h / | awk 'NR==2{print $3 "/" $2 " (" $5 " used)"}') mem: $(free -h | awk '/^Mem/{print $3 "/" $2}')"; sleep 5; done) &
        MONITOR=$!
        PYTHONUNBUFFERED=1 MJSWAN_BASE_PATH="/mjswan/" MJSWAN_NO_LAUNCH=1 uv run python examples/demo/main.py
        kill $MONITOR
        echo "=== Dist size ==="
        du -sh examples/demo/dist
        du -sh examples/demo/dist/*/ 2>/dev/null | sort -rh | head -20

    - name: Deploy to gh-pages branch
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./examples/demo/dist
        force_orphan: true
